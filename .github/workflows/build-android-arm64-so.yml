name: Build Xiangyu Engine Android ARM64 SO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        repository: xqbase/eleeye
        fetch-depth: 1
        ref: master

    # ✅ 直接用 runner 预装的 NDK，零下载、零权限问题、零403
    - name: Use Preinstalled NDK
      run: |
        NDK_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | head -1)
        if [ -z "$NDK_PATH" ]; then
          echo "预装NDK不存在，用 fallback 版本"
          # 万一中招的fallback，用谷歌官方直链（不加验证的）
          wget -q --no-check-certificate https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d $HOME
          NDK_PATH=$HOME/android-ndk-r26b
        fi
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "✅ 找到NDK路径：$NDK_PATH"
        # 验证编译器存在
        ls $NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++

    - name: Build SO
      run: |
        cd eleeye
        echo "=== 开始编译 ==="
        ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
          -std=c++17 \
          -O3 -DNDEBUG \
          -fPIC -shared \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include/android \
          -o libxiangyu_engine.so \
          xiangqi_jni.cpp \
          eleeye.cpp search.cpp evaluate.cpp genmoves.cpp position.cpp hash.cpp book.cpp movesort.cpp preeval.cpp pipe.cpp ucci.cpp pregen.cpp \
          -pthread

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiangyu-engine-android-arm64-so
        path: eleeye/libxiangyu_engine.so
        retention-days: 90
