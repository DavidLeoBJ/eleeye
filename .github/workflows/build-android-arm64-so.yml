name: Build Xiangyu Engine Android ARM64 SO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        repository: xqbase/eleeye
        fetch-depth: 1
        ref: master

    # ✅ 第一步：根目录全局搜，绝不搞错路径（重点搜你提过的test_jni.cpp）
    - name: 全局定位胶水文件
      run: |
        echo "=== 全盘搜索所有可能的胶水文件 ==="
        echo "1. 搜xiangqi_jni.cpp（含大小写）："
        find . -iname "xiangqi_jni.cpp"
        echo "2. 搜你之前提过的test_jni.cpp："
        find . -iname "test_jni.cpp"
        echo "3. 搜所有JNI相关cpp："
        find . -iname "*jni*.cpp"
        echo "4. 搜所有engine/chess相关cpp："
        find . -iname "*engine*.cpp" -o -iname "*chess*.cpp"
        echo "=== 确认base目录的pipe.cpp（这个我们已经对过了） ==="
        ls -l base/pipe.cpp
        echo "=== 根目录所有文件 ==="
        ls -la
        echo "=== eleeye目录所有文件 ==="
        ls -la eleeye/

    - name: Use Preinstalled NDK
      run: |
        NDK_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | head -1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "✅ 找到NDK路径：$NDK_PATH"

    - name: Build SO
      run: |
        # 👇 等上面定位步骤的日志出来，把这里的路径改成实际找到的胶水文件路径
        # 比如日志显示./test_jni.cpp → 填"test_jni.cpp"
        # 比如日志显示./eleeye/xiangqi_jni.cpp → 填"eleeye/xiangqi_jni.cpp"
        JNI_PATH="test_jni.cpp"  # 先默认填你最早提的test_jni.cpp，不对再改
        
        cd eleeye
        echo "=== 确认胶水文件（路径：$JNI_PATH） ==="
        ls -l ../$JNI_PATH  # cd eleeye后，根目录文件要加../
        echo "=== 确认pipe.cpp ==="
        ls -l ../base/pipe.cpp
        echo "=== 开始编译 ==="
        ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
          -std=c++17 \
          -O3 -DNDEBUG \
          -fPIC -shared \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include/android \
          -I. \
          -I../base \
          -o libxiangyu_engine.so \
          ../$JNI_PATH \
          eleeye.cpp search.cpp evaluate.cpp genmoves.cpp position.cpp hash.cpp book.cpp movesort.cpp preeval.cpp \
          ../base/pipe.cpp \
          ucci.cpp pregen.cpp \
          -pthread

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiangyu-engine-android-arm64-so
        path: eleeye/libxiangyu_engine.so
        retention-days: 90
