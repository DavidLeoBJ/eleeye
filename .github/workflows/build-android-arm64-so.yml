name: Build Xiangyu Engine Android ARM64 SO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        repository: xqbase/eleeye
        fetch-depth: 1
        ref: master

    # ✅ 第一步：全局搜文件，不管藏哪、大小写写错没，都能揪出来
    - name: 定位xiangqi_jni.cpp
      run: |
        echo "=== 整个仓库找xiangqi_jni.cpp（含大小写容错）==="
        find . -name "xiangqi_jni.cpp" -o -name "Xiangqi_jni.cpp" -o -name "XIANGQI_JNI.cpp"
        echo "=== 根目录文件 ==="
        ls -la
        echo "=== eleeye目录文件 ==="
        ls -la eleeye/
        echo "=== base目录文件 ==="
        ls -la base/

    - name: Use Preinstalled NDK
      run: |
        NDK_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | head -1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "✅ 找到NDK路径：$NDK_PATH"

    - name: Build SO
      run: |
        cd eleeye
        # 👇 看上面「定位」步骤的日志，改这个路径就行：
        # 如果日志显示文件在根目录：用 ../xiangqi_jni.cpp
        # 如果日志显示文件在eleeye目录：用 xiangqi_jni.cpp
        TARGET_JNI="../xiangqi_jni.cpp"  
        echo "=== 确认胶水文件 ==="
        ls -l $TARGET_JNI
        echo "=== 确认pipe.cpp ==="
        ls -l ../base/pipe.cpp
        echo "=== 开始编译 ==="
        ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
          -std=c++17 \
          -O3 -DNDEBUG \
          -fPIC -shared \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include/android \
          -I. \
          -I../base \
          -o libxiangyu_engine.so \
          $TARGET_JNI \
          eleeye.cpp search.cpp evaluate.cpp genmoves.cpp position.cpp hash.cpp book.cpp movesort.cpp preeval.cpp \
          ../base/pipe.cpp \
          ucci.cpp pregen.cpp \
          -pthread

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiangyu-engine-android-arm64-so
        path: eleeye/libxiangyu_engine.so
        retention-days: 90
