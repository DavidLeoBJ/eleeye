name: Build Xiangyu Engine Android ARM64 SO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        repository: xqbase/eleeye
        fetch-depth: 1
        ref: master  # 要是拉不到代码就改成ref: main

    # ✅ 用runner预装NDK，零下载坑
    - name: Use Preinstalled NDK
      run: |
        NDK_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | head -1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "✅ 找到NDK路径：$NDK_PATH"

    - name: Build SO
      run: |
        cd eleeye
        # 先确认文件都在，避免路径错
        echo "=== 确认依赖文件位置 ==="
        ls -l xiangqi_jni.cpp ../base/pipe.cpp
        echo "=== 开始编译 ==="
        ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
          -std=c++17 \
          -O3 -DNDEBUG \
          -fPIC -shared \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include/android \
          -I../base \  # 告诉编译器去base目录找头文件
          -o libxiangyu_engine.so \
          xiangqi_jni.cpp \
          eleeye.cpp search.cpp evaluate.cpp genmoves.cpp position.cpp hash.cpp book.cpp movesort.cpp preeval.cpp ../base/pipe.cpp ucci.cpp pregen.cpp \
          -pthread

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiangyu-engine-android-arm64-so
        path: eleeye/libxiangyu_engine.so
        retention-days: 90
