name: Build Eleeye Android ARM64 SO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build SO
        run: |
          cd eleeye
          echo "=== 确认文件 ==="
          ls -la xiangqi_jni.cpp
          echo "=== 开始编译 ==="
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -static-libstdc++ \
            -o libeleeye_engine.so \
            xiangqi_jni.cpp \
            pregen.cpp position.cpp genmoves.cpp search.cpp hash.cpp movesort.cpp evaluate.cpp preeval.cpp \
            -I. -IPosition -ISearch
          echo "=== 编译完成，SO大小：==="
          du -h libeleeye_engine.so

      - name: Upload SO
        uses: actions/upload-artifact@v4
        with:
          name: eleeye-engine-android-arm64-so
          path: eleeye/libeleeye_engine.so
