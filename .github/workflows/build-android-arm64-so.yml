name: Build Xiangyu Engine Android ARM64 SO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        repository: xqbase/eleeye
        fetch-depth: 1
        ref: master

    # ✅ 手动装 NDK，零第三方 action 依赖
    - name: Set up NDK r26b
      run: |
        wget -q https://mirrors.tuna.tsinghua.edu.cn/android-ndk/android-ndk-r26b-linux.zip -O /tmp/ndk.zip
        unzip -q /tmp/ndk.zip -d $HOME
        echo "ANDROID_NDK_HOME=$HOME/android-ndk-r26b" >> $GITHUB_ENV
        echo "NDK_HOME=$HOME/android-ndk-r26b" >> $GITHUB_ENV

    - name: Build SO
      run: |
        cd eleeye
        ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
          -std=c++17 \
          -O3 -DNDEBUG \
          -fPIC -shared \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include \
          -I${ANDROID_NDK_HOME}/sysroot/usr/include/android \
          -o libxiangyu_engine.so \
          xiangqi_jni.cpp \
          eleeye.cpp search.cpp evaluate.cpp genmoves.cpp position.cpp hash.cpp book.cpp movesort.cpp preeval.cpp pipe.cpp ucci.cpp pregen.cpp \
          -pthread

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiangyu-engine-android-arm64-so
        path: eleeye/libxiangyu_engine.so
        retention-days: 90
